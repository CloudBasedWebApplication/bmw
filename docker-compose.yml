services:
  web:
    profiles: ["placeholder"]

  configurator:
    profiles: ["placeholder"]

  merchandise:
    profiles: ["placeholder"]

  road:
    profiles: ["placeholder"]

  ai-feature:
    profiles: ["placeholder"]

  cart:
    profiles: ["placeholder"]

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: bmw_app
      MYSQL_USER: bmw_user
      MYSQL_PASSWORD: change_me
      MYSQL_ROOT_PASSWORD: change_me_root
    ports:
      - "3306:3306"
    volumes:
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    ports:
      - "6379:6379"
