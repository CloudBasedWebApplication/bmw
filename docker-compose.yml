services:
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      PORT: 3000
    depends_on:
      - mysql
    volumes:
      - ./api-gateway/src:/app/src
      - ./api-gateway/views:/app/views
      - ./services:/app/services

  car-configurator:
    profiles: ["placeholder"]

  merch-shop:
    profiles: ["placeholder"]

  ai-feature:
    profiles: ["placeholder"]

  shopping-cart:
    profiles: ["placeholder"]

  mysql:
    image: mysql:8.4.8
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d

  mysql-seed:
    image: mysql:8.4.8
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./infrastructure/mysql/init:/seed:ro
    entrypoint: >
      /bin/sh -c "
      mysql
      -h mysql
      -u root
      -p${MYSQL_ROOT_PASSWORD}
      ${MYSQL_DATABASE}
      < /seed/01_merch_shop.sql
      "

  redis:
    image: redis:7.4.2

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - ./infrastructure/minio/data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./assets/configurator:/seed/configurator:ro
      - ./assets/merch-shop:/seed/merch-shop:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:${MINIO_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET};
      mc anonymous set download local/${MINIO_BUCKET};
      mc mirror --overwrite /seed/configurator local/${MINIO_BUCKET}/configurator;
      mc mirror --overwrite /seed/merch-shop local/${MINIO_BUCKET}/merch-shop;
      echo 'Done.';
      "

volumes:
  mysql_data:
