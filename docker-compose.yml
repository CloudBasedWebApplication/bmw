services:
  api-gateway:
    profiles: ["placeholder"]

  car-configurator:
    profiles: ["placeholder"]

  merch-shop:
    profiles: ["placeholder"]

  ai-feature:
    profiles: ["placeholder"]

  shopping-cart:
    profiles: ["placeholder"]

  mysql:
    image: mysql:8.4.8
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7.4.2

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    volumes:
      - ./infrastructure/minio/data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    env_file: .env
    depends_on:
      - minio
    volumes:
      - ./assets/configurator:/seed:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:${MINIO_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET};
      if find /seed -type f | grep -q .; then
        mc mirror --overwrite /seed local/${MINIO_BUCKET};
      else
        echo 'No configurator images found in assets/configurator. Bucket was created only.';
      fi
      "

volumes:
  mysql_data:
