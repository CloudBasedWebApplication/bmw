services:
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      PORT: 3000
    depends_on:
      - mysql
    volumes:
      - ./api-gateway/src:/app/src
      - ./api-gateway/views:/app/views
      - ./services:/app/services

  car-configurator:
    profiles: ["placeholder"]

  merch-shop:
    profiles: ["placeholder"]

  ai-feature:
    profiles: ["placeholder"]

  shopping-cart:
    profiles: ["placeholder"]

  mysql:
    image: mysql:8.4.8
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7.4.2

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - ./infrastructure/minio/data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./Configurator:/seed/configurator:ro
      - ./Webshop:/seed/webshop:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:${MINIO_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET};
      found=0;
      for folder in configurator webshop; do
        if find /seed/$$folder -type f \\( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.webp' -o -iname '*.gif' -o -iname '*.avif' \\) | grep -q .; then
          found=1;
          mc mirror --overwrite --exclude '*.xlsx' /seed/$$folder local/${MINIO_BUCKET}/$$folder;
        fi;
      done;
      if [ $$found -eq 0 ]; then
        echo 'No images found in Configurator/ or Webshop/. Bucket was created only.';
      fi
      "

volumes:
  mysql_data:
